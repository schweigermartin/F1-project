name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TypeScript (lint + typecheck + format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier
        run: pnpm format:check

      - name: tsc --noEmit (all workspaces)
        run: pnpm typecheck

      - name: Unit tests (all workspaces)
        run: pnpm test

  cdk-synth:
    name: CDK synth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: cdk synth
        run: pnpm -F @f1/infra cdk synth
        env:
          CDK_DEFAULT_ACCOUNT: "128663321407"
          CDK_DEFAULT_REGION: eu-central-1

  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ml workspace + dev tools
        run: pip install -e "./ml[dev]"
      - name: Ruff
        run: ruff check ml/
      - name: mypy
        run: mypy --config-file ml/pyproject.toml ml/src
      - name: Pytest
        run: pytest ml/
